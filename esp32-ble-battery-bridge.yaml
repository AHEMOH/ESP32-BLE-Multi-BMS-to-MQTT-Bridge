    lambda: return id(bms1_discharge_off);

  - platform: template
    id: bms2_discharge_off_status
    name: "BMS 2 Discharge Off"
    lambda: return id(bms2_discharge_off);

  - platform: template
    id: bms3_discharge_off_status
    name: "BMS 3 Discharge Off"
    lambda: return id(bms3_discharge_off);

  - platform: template
    id: bms4_discharge_off_status
    name: "BMS 4 Discharge Off"
    lambda: return id(bms4_discharge_off);

