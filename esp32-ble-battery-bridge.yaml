    ssid:
      id: gateway_wifi_ssid
      internal: true
    bssid:
      id: gateway_wifi_bssid
      internal: true

# ═══════════════════════════════════════════════════════════════════════
# SCRIPTS — discovery, status, recovery, per-slot read/publish, HA discovery
# ═══════════════════════════════════════════════════════════════════════
script:
  # ── Discovery trigger ─────────────────────────────────────────────────
  - id: publish_ha_discovery_if_needed
    then:
      - lambda: |-
          if (!id(mqtt_client).is_connected()) {
            return;
          }

          auto now = id(sntp_time).now();
          uint32_t ts = now.is_valid() ? (uint32_t) now.timestamp : 0;
          uint32_t last = id(discovery_last_publish_epoch);
          const uint32_t min_interval_s = 300;

          bool should_publish = false;
          if (last == 0) {
            should_publish = true;
          } else if (last == 1 && ts > 0) {
            should_publish = true;
          } else if (ts > 0 && last > 1 && (ts - last) >= min_interval_s) {
            should_publish = true;
          }

          if (should_publish) {
            ESP_LOGW("DISCOVERY", "Trigger discovery publish (ts=%u, last=%u)", ts, last);
            id(publish_ha_discovery).execute();
          }

  # ── Gateway status ────────────────────────────────────────────────────
  - id: publish_gateway_status
    then:
      - lambda: |-
          const std::string base_topic = std::string("${mqtt_topic_prefix}") + "/" + std::string("${gateway_name}") + "/";
          auto publish_value = [&](const std::string &field, const std::string &value) {
            id(mqtt_client).publish(base_topic + field, value, 0, false);
          };

          auto now = id(sntp_time).now();
          uint32_t ts = now.is_valid() ? (uint32_t) now.timestamp : 0;

          publish_value("timestamp", esphome::to_string(ts));
          publish_value("gateway_name", "${gateway_name}");
          publish_value("gateway_friendly_name", "${gateway_friendly_name}");
          publish_value("data_prefix", "${mqtt_topic_prefix}");
          publish_value("discovery_prefix", "${ha_discovery_prefix}");
          publish_value("wifi_connected", wifi::global_wifi_component->is_connected() ? "true" : "false");
          publish_value("mqtt_connected", id(mqtt_client).is_connected() ? "true" : "false");
          publish_value("read_cycle_running", id(read_cycle_running) ? "true" : "false");
          publish_value("read_cycle_start_epoch", esphome::to_string(id(read_cycle_start_epoch)));
          publish_value("read_cycle_last_success_epoch", esphome::to_string(id(read_cycle_last_success_epoch)));
          publish_value("watchdog_recovery_count", esphome::to_string(id(watchdog_recovery_count)));

          std::string ip = id(gateway_ip_address).has_state() ? id(gateway_ip_address).state : std::string("");
          std::string ssid = id(gateway_wifi_ssid).has_state() ? id(gateway_wifi_ssid).state : std::string("");
          std::string bssid = id(gateway_wifi_bssid).has_state() ? id(gateway_wifi_bssid).state : std::string("");
          publish_value("ip_address", ip.empty() ? "0.0.0.0" : ip);
          publish_value("wifi_ssid", ssid.empty() ? "unknown" : ssid);
          publish_value("wifi_bssid", bssid.empty() ? "unknown" : bssid);

          if (id(gateway_uptime_s).has_state()) {
            publish_value("uptime_s", esphome::to_string((uint32_t) id(gateway_uptime_s).state));
          }

  # ===== RECOVERY =====
  - id: recover_from_stuck_cycle
    mode: single
    then:
      - logger.log:
          level: WARN
          format: "Watchdog recovery: stopping scripts, disconnecting BLE clients, restarting scan"
      - script.stop: read_bms1
      - script.stop: read_bms2
      - script.stop: read_bms3
      - script.stop: read_bms4
      - script.stop: read_bms5
      - script.stop: read_bms6
      - script.stop: read_and_publish_all
      - ble_client.disconnect: bms1_ble_client
      - ble_client.disconnect: bms2_ble_client
      - ble_client.disconnect: bms3_ble_client
      - ble_client.disconnect: bms4_ble_client
      - ble_client.disconnect: bms5_ble_client
      - ble_client.disconnect: bms6_ble_client
      - esp32_ble_tracker.start_scan:
      - lambda: |-
          id(read_cycle_running) = false;
          id(read_cycle_start_epoch) = 0;

  # ===== PUBLISH BMS 1 =====
  - id: publish_bms1
    then:
      - lambda: |-
          if (id(bms1_voltage_mv) == 0) {
            return;
          }

          id(publish_ha_discovery_if_needed).execute();

          std::string ble_name = "${bms1_name}";
          std::string ble_mac = !std::string("${bms1_mac}").empty() ? std::string("${bms1_mac}") : id(bms1_bound_mac);
          float power_w = ((float)id(bms1_voltage_mv) / 1000.0f) * ((float)id(bms1_current_ma) / 1000.0f);

          auto now = id(sntp_time).now();
          uint32_t ts = id(bms1_last_read_epoch) > 0 ? id(bms1_last_read_epoch) : (now.is_valid() ? (uint32_t)now.timestamp : 0);
          int rssi = id(bms1_rssi);
          int rssi_quality_pct = rssi <= -100 ? 0 : (rssi >= -50 ? 100 : (2 * (rssi + 100)));
          const char *rssi_quality = rssi >= -60 ? "excellent" : (rssi >= -70 ? "good" : (rssi >= -80 ? "fair" : (rssi >= -90 ? "weak" : "very_weak")));
          uint16_t cell_max_mv = id(bms1_cell1_mv);
          uint16_t cell_min_mv = id(bms1_cell1_mv);
          if (id(bms1_cell2_mv) > cell_max_mv) cell_max_mv = id(bms1_cell2_mv);
          if (id(bms1_cell3_mv) > cell_max_mv) cell_max_mv = id(bms1_cell3_mv);
          if (id(bms1_cell4_mv) > cell_max_mv) cell_max_mv = id(bms1_cell4_mv);
          if (id(bms1_cell2_mv) < cell_min_mv) cell_min_mv = id(bms1_cell2_mv);
          if (id(bms1_cell3_mv) < cell_min_mv) cell_min_mv = id(bms1_cell3_mv);
          if (id(bms1_cell4_mv) < cell_min_mv) cell_min_mv = id(bms1_cell4_mv);
          uint16_t cell_delta_mv = cell_max_mv - cell_min_mv;
          const char *cell_delta_status = cell_delta_mv <= 10 ? "good" : (cell_delta_mv <= 20 ? "light" : (cell_delta_mv <= 40 ? "warning" : "critical"));
          const std::string base_topic = std::string("${mqtt_topic_prefix}") + "/" + ble_name + "/";
          auto publish_value = [&](const std::string &field, const std::string &value) {
            id(mqtt_client).publish(base_topic + field, value, 0, false);
          };

          publish_value("timestamp", esphome::to_string(ts));
          publish_value("ble_name", ble_name);
          publish_value("ble_mac", ble_mac);
          publish_value("rssi", esphome::to_string(rssi));
          publish_value("rssi_quality_pct", esphome::to_string(rssi_quality_pct));
          publish_value("rssi_quality", rssi_quality);
          publish_value("voltage_mv", esphome::to_string(id(bms1_voltage_mv)));
          publish_value("current_ma", esphome::to_string(id(bms1_current_ma)));
          publish_value("power_w", esphome::str_sprintf("%.3f", power_w));
          publish_value("pack_voltage_mv", esphome::to_string(id(bms1_pack_voltage_mv)));
          publish_value("remain_ah", esphome::to_string(id(bms1_remain_ah)));
          publish_value("factory_ah", esphome::to_string(id(bms1_factory_ah)));
          publish_value("cell_temp", esphome::to_string((int)id(bms1_cell_temp)));
          publish_value("mosfet_temp", esphome::to_string((int)id(bms1_mosfet_temp)));
          publish_value("soc", esphome::to_string(id(bms1_soc)));
          publish_value("soh", esphome::to_string(id(bms1_soh)));
          publish_value("cell1_mv", esphome::to_string(id(bms1_cell1_mv)));
          publish_value("cell2_mv", esphome::to_string(id(bms1_cell2_mv)));
          publish_value("cell3_mv", esphome::to_string(id(bms1_cell3_mv)));
          publish_value("cell4_mv", esphome::to_string(id(bms1_cell4_mv)));
          publish_value("cell_delta_mv", esphome::to_string(cell_delta_mv));
          publish_value("cell_delta_status", cell_delta_status);
          publish_value("equil_state", esphome::to_string(id(bms1_equil_state)));
          std::string bms1_equil_cell;
          uint8_t bms1_eq = id(bms1_equil_state);
          if (bms1_eq & 0x01) bms1_equil_cell += (bms1_equil_cell.empty() ? "" : ",") + std::string("cell1");
          if (bms1_eq & 0x02) bms1_equil_cell += (bms1_equil_cell.empty() ? "" : ",") + std::string("cell2");
          if (bms1_eq & 0x04) bms1_equil_cell += (bms1_equil_cell.empty() ? "" : ",") + std::string("cell3");
          if (bms1_eq & 0x08) bms1_equil_cell += (bms1_equil_cell.empty() ? "" : ",") + std::string("cell4");
          publish_value("equil_cell", bms1_equil_cell.empty() ? "none" : bms1_equil_cell);
          publish_value("protect_state", esphome::to_string(id(bms1_protect_state)));
          publish_value("discharge_switch", id(bms1_discharge_off) ? "OFF" : "ON");
          const char *bms1_operating_mode = id(bms1_operating_mode_raw) == 0 ? "idle" : (id(bms1_operating_mode_raw) == 1 ? "charge" : (id(bms1_operating_mode_raw) == 2 ? "discharge" : "unknown"));
          publish_value("operating_mode_raw", esphome::to_string(id(bms1_operating_mode_raw)));
          publish_value("operating_mode", bms1_operating_mode);
          if (id(bms1_discharge_off)) {
            publish_value("voltage_context", "discharge_off_terminal_voltage_may_drop");
          } else {
            publish_value("voltage_context", "normal_output_or_charge_path_voltage");
          }
          publish_value("cycle_count", esphome::to_string(id(bms1_cycle_count)));
          publish_value("discharge_ah_count", esphome::to_string(id(bms1_discharge_ah_count)));
          if (std::string("${debug_status_flags_hex}") == "true") {
            publish_value("status_flags_hex", esphome::str_sprintf("0x%08X", (unsigned int)id(bms1_status_flags)));
          }
          if (std::string("${publish_raw_frame_hex}") == "true" && !id(bms1_last_frame_hex).empty()) {
            id(mqtt_client).publish(base_topic + "raw_frame_hex", id(bms1_last_frame_hex), 0, false);
          }

  # ===== PUBLISH BMS 2 =====
  - id: publish_bms2
    then:
      - lambda: |-
          if (id(bms2_voltage_mv) == 0) {
            return;
          }

          id(publish_ha_discovery_if_needed).execute();

          std::string ble_name = "${bms2_name}";
          std::string ble_mac = !std::string("${bms2_mac}").empty() ? std::string("${bms2_mac}") : id(bms2_bound_mac);
          float power_w = ((float)id(bms2_voltage_mv) / 1000.0f) * ((float)id(bms2_current_ma) / 1000.0f);

          auto now = id(sntp_time).now();
          uint32_t ts = id(bms2_last_read_epoch) > 0 ? id(bms2_last_read_epoch) : (now.is_valid() ? (uint32_t)now.timestamp : 0);
          int rssi = id(bms2_rssi);
          int rssi_quality_pct = rssi <= -100 ? 0 : (rssi >= -50 ? 100 : (2 * (rssi + 100)));
