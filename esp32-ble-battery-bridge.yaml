# ═══════════════════════════════════════════════════════════════════════
# BLE TRACKER — auto-binding: advertised name → MAC → NVS flash
# ═══════════════════════════════════════════════════════════════════════
esp32_ble_tracker:
  scan_parameters:
    interval: 1.1s
    window: 1.1s
    active: true
  on_ble_advertise:
    then:
      - lambda: |-
          const std::string adv_mac = x.address_str();
          const std::string adv_name = x.get_name();

          if (adv_name.empty()) {
            return;
          }

          bool likely_bms = false;
          if (adv_name.rfind("P-", 0) == 0) likely_bms = true;
          if (adv_name.rfind("L-", 0) == 0) likely_bms = true;
          if (adv_name.rfind("R-", 0) == 0) likely_bms = true;
          if (!likely_bms) {
            return;
          }

          if (id(discovery_last_mac) == adv_mac) {
            return;
          }
          id(discovery_last_mac) = adv_mac;

          auto bind_slot = [&](int slot, const std::string &slot_name, const std::string &slot_mac, const std::string &slot_enabled, std::string &bound_mac, int16_t &slot_rssi) {
            if (slot_enabled != "true" || slot_name.empty()) {
              return;
            }

            const bool name_match = (adv_name == slot_name);
            const bool static_mode = !slot_mac.empty();
            const std::string expected_mac = static_mode ? slot_mac : bound_mac;
            const bool mac_match = !expected_mac.empty() && (adv_mac == expected_mac);

            if (name_match) {
              slot_rssi = x.get_rssi();
              if (!static_mode && bound_mac != adv_mac) {
                bound_mac = adv_mac;
              }

              if (static_mode && slot_mac != adv_mac) {
                ESP_LOGW("BIND", "Slot %d (%s): name match but MAC mismatch (expected=%s seen=%s)", slot, slot_name.c_str(), slot_mac.c_str(), adv_mac.c_str());
              }
              return;
            }

            if (mac_match) {
              slot_rssi = x.get_rssi();
              ESP_LOGW("BIND", "Slot %d (%s): MAC match but name mismatch (seen=%s)", slot, slot_name.c_str(), adv_name.c_str());

              if (!static_mode) {
                bound_mac.clear();
              }
            }
          };

          bind_slot(1, "${bms1_name}", "${bms1_mac}", "${bms1_enabled}", id(bms1_bound_mac), id(bms1_rssi));
          bind_slot(2, "${bms2_name}", "${bms2_mac}", "${bms2_enabled}", id(bms2_bound_mac), id(bms2_rssi));
          bind_slot(3, "${bms3_name}", "${bms3_mac}", "${bms3_enabled}", id(bms3_bound_mac), id(bms3_rssi));
          bind_slot(4, "${bms4_name}", "${bms4_mac}", "${bms4_enabled}", id(bms4_bound_mac), id(bms4_rssi));
          bind_slot(5, "${bms5_name}", "${bms5_mac}", "${bms5_enabled}", id(bms5_bound_mac), id(bms5_rssi));
          bind_slot(6, "${bms6_name}", "${bms6_mac}", "${bms6_enabled}", id(bms6_bound_mac), id(bms6_rssi));

# ═══════════════════════════════════════════════════════════════════════
# BLE CLIENTS — one per slot (auto_connect: false — driven by scripts)
# ═══════════════════════════════════════════════════════════════════════
ble_client:
  - mac_address: "${bms1_mac}"
    id: bms1_ble_client
    auto_connect: false

  - mac_address: "${bms2_mac}"
    id: bms2_ble_client
    auto_connect: false

  - # Placeholder MACs for slots 3–6; actual address is set via set_address() before connect,
    # which allows empty bmsX_mac substitutions.
    mac_address: "00:00:00:00:00:03"
    id: bms3_ble_client
    auto_connect: false

  - mac_address: "00:00:00:00:00:04"
    id: bms4_ble_client
    auto_connect: false

  - mac_address: "00:00:00:00:00:05"
    id: bms5_ble_client
    auto_connect: false

  - mac_address: "00:00:00:00:00:06"
    id: bms6_ble_client
    auto_connect: false

# ═══════════════════════════════════════════════════════════════════════
# SENSORS — BLE frame parsers (105-byte frame, little-endian, checksum @ byte 104)
# ═══════════════════════════════════════════════════════════════════════
sensor:
  - platform: uptime
    id: gateway_uptime_s
    internal: true

  # ===== BMS 1 Parser =====
  - platform: ble_client
    type: characteristic
    id: bms1_raw_notify
    internal: true
    ble_client_id: bms1_ble_client
    service_uuid: "0000ffe0-0000-1000-8000-00805f9b34fb"
    characteristic_uuid: "0000ffe1-0000-1000-8000-00805f9b34fb"
    notify: true
    lambda: |-
      if (x.size() != 105) {
        ESP_LOGW("BMS1", "Invalid frame length: %u", (unsigned int)x.size());
        return NAN;
      }

      uint32_t checksum_sum = 0;
      for (size_t i = 0; i < 104; i++) {
        checksum_sum += x[i];
      }
      bool checksum_ok = ((checksum_sum & 0xFF) == x[104]);
      if (!checksum_ok) {
        ESP_LOGW("BMS1", "Checksum mismatch: calc=0x%02X recv=0x%02X", (unsigned int)(checksum_sum & 0xFF), (unsigned int)x[104]);
        return NAN;
      }

      auto u16le = [&](size_t p) -> uint16_t {
        if (p + 1 >= x.size()) return 0;
        return (uint16_t)x[p] | ((uint16_t)x[p + 1] << 8);
      };
      auto u32le = [&](size_t p) -> uint32_t {
        if (p + 3 >= x.size()) return 0;
        return (uint32_t)x[p] |
               ((uint32_t)x[p + 1] << 8) |
               ((uint32_t)x[p + 2] << 16) |
               ((uint32_t)x[p + 3] << 24);
      };
      auto s16le = [&](size_t p) -> int16_t {
        return (int16_t)u16le(p);
      };
      auto s32le = [&](size_t p) -> int32_t {
        return (int32_t)u32le(p);
      };

      id(bms1_pack_voltage_mv) = (uint16_t)u32le(8);
      id(bms1_voltage_mv) = (uint16_t)u32le(12);
      id(bms1_current_ma) = (int16_t)s32le(48);
      id(bms1_remain_ah) = (uint16_t)((u16le(62) + 50) / 100);
      id(bms1_factory_ah) = (uint16_t)((u16le(64) + 50) / 100);
      id(bms1_cell_temp) = u16le(52);
      id(bms1_mosfet_temp) = u16le(54);
      id(bms1_cell1_mv) = u16le(16);
      id(bms1_cell2_mv) = u16le(18);
      id(bms1_cell3_mv) = u16le(20);
      id(bms1_cell4_mv) = u16le(22);
      id(bms1_equil_state) = (uint8_t)u32le(84);
      id(bms1_protect_state) = (uint8_t)u32le(76);
      id(bms1_soc) = (uint8_t)u16le(90);
      id(bms1_soh) = (uint8_t)u16le(92);

      id(bms1_status_flags) = u32le(68);
      id(bms1_discharge_off) = (id(bms1_status_flags) & 0x80U) != 0U;
      id(bms1_discharge_switch_state) = id(bms1_discharge_off) ? 0 : 1;
      id(bms1_operating_mode_raw) = (uint8_t)u16le(88);

      uint32_t cycle_primary = u32le(96);
      uint32_t cycle_legacy = (uint32_t)u16le(66);
      bool cycle_primary_plausible = cycle_primary > 0 && cycle_primary < 1000000UL;
      id(bms1_cycle_count) = cycle_primary_plausible ? cycle_primary : cycle_legacy;

      uint32_t discharge_primary = u32le(100);
      uint32_t discharge_legacy = u32le(68);
      bool discharge_primary_plausible = discharge_primary > 0 && discharge_primary < 100000000UL;
      id(bms1_discharge_ah_count) = discharge_primary_plausible ? discharge_primary : discharge_legacy;

      if (std::string("${debug_status_flags_hex}") == "true") {
        ESP_LOGW("BMS1", "status_flags=0x%08X discharge_off=%s", (unsigned int)id(bms1_status_flags), id(bms1_discharge_off) ? "true" : "false");
      }

      if (std::string("${publish_raw_frame_hex}") == "true") {
        static const char *hex_chars = "0123456789ABCDEF";
        std::string frame_hex;
        frame_hex.reserve(x.size() * 2);
        for (uint8_t b : x) {
          frame_hex.push_back(hex_chars[(b >> 4) & 0x0F]);
          frame_hex.push_back(hex_chars[b & 0x0F]);
        }
        id(bms1_last_frame_hex) = frame_hex;
      }

      id(bms1_frame_received) = true;
      id(bms1_connected) = true;
      auto now = id(sntp_time).now();
      if (now.is_valid()) {
        id(bms1_last_read_epoch) = (uint32_t)now.timestamp;
      }

      return (float)x.size();
    update_interval: never

