  # ===== MAIN CYCLE =====
  - id: read_and_publish_all
    mode: single
    then:
      - lambda: |-
          uint32_t now_ts = 0;
          auto now = id(sntp_time).now();
          if (now.is_valid()) {
            now_ts = (uint32_t) now.timestamp;
          } else {
            now_ts = (uint32_t) (millis() / 1000UL);
          }
          id(read_cycle_running) = true;
          id(read_cycle_start_epoch) = now_ts;
      - if:
          condition:
            and:
              - wifi.connected:
              - mqtt.connected:
          then:
            - esp32_ble_tracker.stop_scan:
            - logger.log: "Starting multi-battery read cycle"
            - script.execute: read_bms1
            - script.wait: read_bms1
            - script.execute: read_bms2
            - script.wait: read_bms2
            - script.execute: read_bms3
            - script.wait: read_bms3
            - script.execute: read_bms4
            - script.wait: read_bms4
            - script.execute: read_bms5
            - script.wait: read_bms5
            - script.execute: read_bms6
            - script.wait: read_bms6
            - script.execute: publish_system_aggregate
            - esp32_ble_tracker.start_scan:
            - logger.log: "Multi-battery read cycle complete"
            - lambda: |-
                uint32_t now_ts = 0;
                auto now = id(sntp_time).now();
                if (now.is_valid()) {
                  now_ts = (uint32_t) now.timestamp;
                } else {
                  now_ts = (uint32_t) (millis() / 1000UL);
                }
                id(read_cycle_last_success_epoch) = now_ts;
                id(watchdog_recovery_count) = 0;
          else:
            - logger.log:
                level: WARN
                format: "Skipping read cycle (wifi=%s, mqtt=%s)"
                args:
                  - 'wifi::global_wifi_component->is_connected() ? "connected" : "not_connected"'
                  - 'id(mqtt_client).is_connected() ? "connected" : "not_connected"'
      - lambda: |-
          id(read_cycle_running) = false;

# ═══════════════════════════════════════════════════════════════════════
# INTERVALS — poll cycle, watchdog, periodic status publish
# ═══════════════════════════════════════════════════════════════════════
interval:
  - interval: ${poll_interval}
    then:
      - if:
          condition:
            lambda: return !id(read_and_publish_all).is_running();
          then:
            - script.execute: read_and_publish_all
          else:
            - logger.log:
                level: WARN
                format: "Skipping cycle trigger (read_and_publish_all still running)"

  - interval: 30s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - mqtt.connected:
          then:
            - lambda: |-
                uint32_t now_ts = 0;
                auto now = id(sntp_time).now();
                if (now.is_valid()) {
                  now_ts = (uint32_t) now.timestamp;
                } else {
                  now_ts = (uint32_t) (millis() / 1000UL);
                }

                const uint32_t hang_timeout_s = (uint32_t) atoi("${watchdog_hang_timeout_s}");
                const uint32_t idle_recover_s = (uint32_t) atoi("${watchdog_idle_recover_s}");
                const uint32_t reboot_after = (uint32_t) atoi("${watchdog_reboot_after_recoveries}");

                if (id(read_cycle_running) && id(read_cycle_start_epoch) > 0 && (now_ts - id(read_cycle_start_epoch)) > hang_timeout_s) {
                  id(watchdog_recovery_count) += 1U;
                  if (id(watchdog_recovery_count) < reboot_after) {
                    ESP_LOGE("WATCHDOG", "Read cycle hang detected (>%us). Soft recovery #%u", (unsigned int) hang_timeout_s, (unsigned int) id(watchdog_recovery_count));
                    id(recover_from_stuck_cycle).execute();
                  } else {
                    ESP_LOGE("WATCHDOG", "Read cycle hang persists (>%us). Reboot #%u", (unsigned int) hang_timeout_s, (unsigned int) id(watchdog_recovery_count));
                    ESP.restart();
                  }
                  return;
                }

                if (!id(read_cycle_running) && id(read_cycle_last_success_epoch) > 0 && (now_ts - id(read_cycle_last_success_epoch)) > idle_recover_s) {
                  ESP_LOGW("WATCHDOG", "No successful cycle for >%us. Triggering recovery cycle.", (unsigned int) idle_recover_s);
                  id(read_and_publish_all).execute();
                }

  - interval: 60s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - mqtt.connected:
          then:
            - script.execute: publish_gateway_status

# ═══════════════════════════════════════════════════════════════════════
# SWITCH — manual read trigger
# ═══════════════════════════════════════════════════════════════════════
switch:
  - platform: template
    name: "Read All Batteries (Manual)"
    id: bms_manual_read
    turn_on_action:
      - if:
          condition:
            lambda: return !id(read_and_publish_all).is_running();
          then:
            - script.execute: read_and_publish_all
          else:
            - logger.log:
                level: WARN
                format: "Manual trigger ignored (read_and_publish_all still running)"
    turn_off_action: []
    lambda: return false;
