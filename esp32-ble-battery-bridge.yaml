        ESP_LOGW("BMS4", "status_flags=0x%08X discharge_off=%s", (unsigned int)id(bms4_status_flags), id(bms4_discharge_off) ? "true" : "false");
      }

      if (std::string("${publish_raw_frame_hex}") == "true") {
        static const char *hex_chars = "0123456789ABCDEF";
        std::string frame_hex;
        frame_hex.reserve(x.size() * 2);
        for (uint8_t b : x) {
          frame_hex.push_back(hex_chars[(b >> 4) & 0x0F]);
          frame_hex.push_back(hex_chars[b & 0x0F]);
        }
        id(bms4_last_frame_hex) = frame_hex;
      }

      id(bms4_frame_received) = true;
      id(bms4_connected) = true;
      auto now = id(sntp_time).now();
      if (now.is_valid()) { id(bms4_last_read_epoch) = (uint32_t)now.timestamp; }
      return (float)x.size();
    update_interval: never

  - platform: ble_client
    type: characteristic
    id: bms5_raw_notify
    internal: true
    ble_client_id: bms5_ble_client
    service_uuid: "0000ffe0-0000-1000-8000-00805f9b34fb"
    characteristic_uuid: "0000ffe1-0000-1000-8000-00805f9b34fb"
    notify: true
    lambda: |-
      if (x.size() != 105) {
        ESP_LOGW("BMS5", "Invalid frame length: %u", (unsigned int)x.size());
        return NAN;
      }
      uint32_t checksum_sum = 0;
      for (size_t i = 0; i < 104; i++) checksum_sum += x[i];
      bool checksum_ok = ((checksum_sum & 0xFF) == x[104]);
      if (!checksum_ok) {
        ESP_LOGW("BMS5", "Checksum mismatch: calc=0x%02X recv=0x%02X", (unsigned int)(checksum_sum & 0xFF), (unsigned int)x[104]);
        return NAN;
      }
      auto u16le = [&](size_t p) -> uint16_t {
        if (p + 1 >= x.size()) return 0;
        return (uint16_t)x[p] | ((uint16_t)x[p + 1] << 8);
      };
      auto u32le = [&](size_t p) -> uint32_t {
        if (p + 3 >= x.size()) return 0;
        return (uint32_t)x[p] | ((uint32_t)x[p + 1] << 8) | ((uint32_t)x[p + 2] << 16) | ((uint32_t)x[p + 3] << 24);
      };
      auto s16le = [&](size_t p) -> int16_t { return (int16_t)u16le(p); };
      auto s32le = [&](size_t p) -> int32_t { return (int32_t)u32le(p); };

      id(bms5_pack_voltage_mv) = (uint16_t)u32le(8);
      id(bms5_voltage_mv) = (uint16_t)u32le(12);
      id(bms5_current_ma) = (int16_t)s32le(48);
      id(bms5_remain_ah) = (uint16_t)((u16le(62) + 50) / 100);
      id(bms5_factory_ah) = (uint16_t)((u16le(64) + 50) / 100);
      id(bms5_cell_temp) = u16le(52);
      id(bms5_mosfet_temp) = u16le(54);
      id(bms5_cell1_mv) = u16le(16);
      id(bms5_cell2_mv) = u16le(18);
      id(bms5_cell3_mv) = u16le(20);
      id(bms5_cell4_mv) = u16le(22);
      id(bms5_equil_state) = (uint8_t)u32le(84);
      id(bms5_protect_state) = (uint8_t)u32le(76);
      id(bms5_soc) = (uint8_t)u16le(90);
      id(bms5_soh) = (uint8_t)u16le(92);

      id(bms5_status_flags) = u32le(68);
      id(bms5_discharge_off) = (id(bms5_status_flags) & 0x80U) != 0U;
      id(bms5_discharge_switch_state) = id(bms5_discharge_off) ? 0 : 1;
      id(bms5_operating_mode_raw) = (uint8_t)u16le(88);

      uint32_t cycle_primary = u32le(96);
      uint32_t cycle_legacy = (uint32_t)u16le(66);
      bool cycle_primary_plausible = cycle_primary > 0 && cycle_primary < 1000000UL;
      id(bms5_cycle_count) = cycle_primary_plausible ? cycle_primary : cycle_legacy;

      uint32_t discharge_primary = u32le(100);
      uint32_t discharge_legacy = u32le(68);
      bool discharge_primary_plausible = discharge_primary > 0 && discharge_primary < 100000000UL;
      id(bms5_discharge_ah_count) = discharge_primary_plausible ? discharge_primary : discharge_legacy;

      if (std::string("${debug_status_flags_hex}") == "true") {
        ESP_LOGW("BMS5", "status_flags=0x%08X discharge_off=%s", (unsigned int)id(bms5_status_flags), id(bms5_discharge_off) ? "true" : "false");
      }

      if (std::string("${publish_raw_frame_hex}") == "true") {
        static const char *hex_chars = "0123456789ABCDEF";
        std::string frame_hex;
        frame_hex.reserve(x.size() * 2);
        for (uint8_t b : x) {
          frame_hex.push_back(hex_chars[(b >> 4) & 0x0F]);
          frame_hex.push_back(hex_chars[b & 0x0F]);
        }
        id(bms5_last_frame_hex) = frame_hex;
      }

      id(bms5_frame_received) = true;
      id(bms5_connected) = true;
      auto now = id(sntp_time).now();
      if (now.is_valid()) { id(bms5_last_read_epoch) = (uint32_t)now.timestamp; }
      return (float)x.size();
    update_interval: never

