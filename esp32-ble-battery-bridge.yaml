          publish_sensor("expected_slots", "Batteries Expected", pack_base + "expected_slots", pack_dev_id, pack_dev_name, pack_dev_model, "", "", "measurement", "mdi:counter");
          publish_sensor("topology_reporting", "Topology Reporting", pack_base + "topology_reporting", pack_dev_id, pack_dev_name, pack_dev_model, "", "", "", "mdi:format-list-numbered");
          publish_sensor("series_groups", "Configured Series Groups", pack_base + "series_groups", pack_dev_id, pack_dev_name, pack_dev_model, "", "", "measurement", "mdi:counter");
          publish_binary_sensor("topology_complete", "Topology Complete", pack_base + "topology_complete", pack_dev_id, pack_dev_name, pack_dev_model, "true", "false", "", "mdi:check-decagram");


  # ===== READ ROUTINES =====
  - id: read_bms1
    mode: single
    then:
      - if:
          condition:
            lambda: return !std::string("${bms1_name}").empty() && std::string("${bms1_enabled}") == "true" && (!std::string("${bms1_mac}").empty() || !id(bms1_bound_mac).empty());
          then:
            - lambda: |-
                std::string effective_mac = !std::string("${bms1_mac}").empty() ? std::string("${bms1_mac}") : id(bms1_bound_mac);
                unsigned int b0, b1, b2, b3, b4, b5;
                if (sscanf(effective_mac.c_str(), "%02x:%02x:%02x:%02x:%02x:%02x", &b0, &b1, &b2, &b3, &b4, &b5) == 6) {
                  uint64_t addr = ((uint64_t)b0 << 40) | ((uint64_t)b1 << 32) | ((uint64_t)b2 << 24) | ((uint64_t)b3 << 16) | ((uint64_t)b4 << 8) | (uint64_t)b5;
                  id(bms1_ble_client).set_address(addr);
                }
            - globals.set: { id: bms1_frame_received, value: "false" }
            - ble_client.connect: bms1_ble_client
            - delay: ${ble_connect_timeout}
            - ble_client.ble_write:
                id: bms1_ble_client
                service_uuid: "0000ffe0-0000-1000-8000-00805f9b34fb"
                characteristic_uuid: "0000ffe2-0000-1000-8000-00805f9b34fb"
                value: [0x00, 0x00, 0x04, 0x01, 0x13, 0x55, 0xAA, 0x17]
            - delay: ${ble_read_timeout}
            - if:
                condition: { lambda: return id(bms1_frame_received); }
                then:
                  - script.execute: publish_bms1
                else:
                  - logger.log:
                      level: WARN
                      format: "BMS1: first read attempt failed, retrying BLE session"
                  - ble_client.disconnect: bms1_ble_client
                  - delay: ${ble_disconnect_settle_delay}
                  - delay: ${ble_retry_backoff_delay}
                  - globals.set: { id: bms1_frame_received, value: "false" }
                  - ble_client.connect: bms1_ble_client
                  - delay: ${ble_connect_timeout}
                  - ble_client.ble_write:
                      id: bms1_ble_client
                      service_uuid: "0000ffe0-0000-1000-8000-00805f9b34fb"
                      characteristic_uuid: "0000ffe2-0000-1000-8000-00805f9b34fb"
                      value: [0x00, 0x00, 0x04, 0x01, 0x13, 0x55, 0xAA, 0x17]
                  - delay: ${ble_read_timeout}
                  - if:
                      condition: { lambda: return id(bms1_frame_received); }
                      then:
                        - script.execute: publish_bms1
                      else:
                        - globals.set: { id: bms1_connected, value: "false" }
            - ble_client.disconnect: bms1_ble_client
            - delay: ${ble_disconnect_settle_delay}
            - delay: ${ble_sequential_delay}

  - id: read_bms2
    mode: single
    then:
      - if:
          condition:
            lambda: return !std::string("${bms2_name}").empty() && std::string("${bms2_enabled}") == "true" && (!std::string("${bms2_mac}").empty() || !id(bms2_bound_mac).empty());
          then:
            - lambda: |-
                std::string effective_mac = !std::string("${bms2_mac}").empty() ? std::string("${bms2_mac}") : id(bms2_bound_mac);
                unsigned int b0, b1, b2, b3, b4, b5;
                if (sscanf(effective_mac.c_str(), "%02x:%02x:%02x:%02x:%02x:%02x", &b0, &b1, &b2, &b3, &b4, &b5) == 6) {
                  uint64_t addr = ((uint64_t)b0 << 40) | ((uint64_t)b1 << 32) | ((uint64_t)b2 << 24) | ((uint64_t)b3 << 16) | ((uint64_t)b4 << 8) | (uint64_t)b5;
                  id(bms2_ble_client).set_address(addr);
                }
            - globals.set: { id: bms2_frame_received, value: "false" }
            - ble_client.connect: bms2_ble_client
            - delay: ${ble_connect_timeout}
            - ble_client.ble_write:
                id: bms2_ble_client
                service_uuid: "0000ffe0-0000-1000-8000-00805f9b34fb"
                characteristic_uuid: "0000ffe2-0000-1000-8000-00805f9b34fb"
                value: [0x00, 0x00, 0x04, 0x01, 0x13, 0x55, 0xAA, 0x17]
            - delay: ${ble_read_timeout}
            - if:
                condition: { lambda: return id(bms2_frame_received); }
                then:
                  - script.execute: publish_bms2
                else:
                  - logger.log:
                      level: WARN
                      format: "BMS2: first read attempt failed, retrying BLE session"
                  - ble_client.disconnect: bms2_ble_client
                  - delay: ${ble_disconnect_settle_delay}
                  - delay: ${ble_retry_backoff_delay}
                  - globals.set: { id: bms2_frame_received, value: "false" }
                  - ble_client.connect: bms2_ble_client
                  - delay: ${ble_connect_timeout}
                  - ble_client.ble_write:
                      id: bms2_ble_client
                      service_uuid: "0000ffe0-0000-1000-8000-00805f9b34fb"
                      characteristic_uuid: "0000ffe2-0000-1000-8000-00805f9b34fb"
                      value: [0x00, 0x00, 0x04, 0x01, 0x13, 0x55, 0xAA, 0x17]
                  - delay: ${ble_read_timeout}
                  - if:
                      condition: { lambda: return id(bms2_frame_received); }
                      then:
