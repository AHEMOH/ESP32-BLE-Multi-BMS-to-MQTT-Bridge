            std::string cfg_topic = discovery_prefix + "/sensor/" + node_id + "/" + object_id + "/config";
            std::string payload = "{";
            payload += "\"name\":\"" + name + "\",";
            payload += "\"unique_id\":\"" + node_id + "_" + object_id + "\",";
            payload += "\"state_topic\":\"" + state_topic + "\",";
            payload += "\"value_template\":\"{{ (value | int) | timestamp_local if (value | int) > 0 else none }}\",";
            payload += "\"device_class\":\"timestamp\",";
            payload += "\"device\":{";
            payload += "\"identifiers\":[\"" + device_id + "\"],";
            payload += "\"name\":\"" + device_name + "\",";
            payload += "\"manufacturer\":\"ESPHome\",";
            payload += "\"model\":\"" + device_model + "\"";
            payload += "}";
            if (!icon.empty()) {
              payload += ",\"icon\":\"" + icon + "\"";
            }
            payload += "}";
            id(mqtt_client).publish(cfg_topic, payload, 0, true);
