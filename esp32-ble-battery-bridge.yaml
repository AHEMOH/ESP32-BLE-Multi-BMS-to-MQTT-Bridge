          publish_sensor("pack_rssi_quality_pct", "RSSI Quality", pack_base + "pack_rssi_quality_pct", pack_dev_id, pack_dev_name, pack_dev_model, "%", "", "measurement", "mdi:wifi");
          publish_sensor("pack_rssi_quality", "RSSI Quality Label", pack_base + "pack_rssi_quality", pack_dev_id, pack_dev_name, pack_dev_model, "", "", "", "mdi:wifi");
          publish_sensor("series_group_voltage_delta_mv", "Series Group Voltage Delta", pack_base + "series_group_voltage_delta_mv", pack_dev_id, pack_dev_name, pack_dev_model, "mV", "", "measurement", "mdi:delta");
          publish_sensor("slot_voltage_delta_mv", "Battery Voltage Spread", pack_base + "slot_voltage_delta_mv", pack_dev_id, pack_dev_name, pack_dev_model, "mV", "", "measurement", "mdi:delta");
