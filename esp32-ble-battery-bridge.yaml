  # ===== SYSTEM AGGREGATION =====
  - id: publish_system_aggregate
    then:
      - lambda: |-
          const std::string topology = "${battery_system_topology}";
          const std::string system_name = "${battery_system_name}";

          struct GroupAgg {
            std::vector<int> slots;
            float voltage_mv = 0.0f;
            float current_ma = 0.0f;
            float capacity_ah = 0.0f;
            float remain_ah = 0.0f;
            int contributing = 0;
          };

          auto slot_enabled = [&](int slot) -> bool {
            switch (slot) {
              case 1: return std::string("${bms1_enabled}") == "true";
              case 2: return std::string("${bms2_enabled}") == "true";
              case 3: return std::string("${bms3_enabled}") == "true";
              case 4: return std::string("${bms4_enabled}") == "true";
              case 5: return std::string("${bms5_enabled}") == "true";
              case 6: return std::string("${bms6_enabled}") == "true";
              default: return false;
            }
          };

          auto slot_voltage_mv = [&](int slot) -> uint16_t {
            switch (slot) {
              case 1: return id(bms1_voltage_mv);
              case 2: return id(bms2_voltage_mv);
              case 3: return id(bms3_voltage_mv);
              case 4: return id(bms4_voltage_mv);
              case 5: return id(bms5_voltage_mv);
              case 6: return id(bms6_voltage_mv);
              default: return 0;
            }
          };

          auto slot_current_ma = [&](int slot) -> int16_t {
            switch (slot) {
              case 1: return id(bms1_current_ma);
              case 2: return id(bms2_current_ma);
              case 3: return id(bms3_current_ma);
              case 4: return id(bms4_current_ma);
              case 5: return id(bms5_current_ma);
              case 6: return id(bms6_current_ma);
              default: return 0;
            }
          };

          auto slot_capacity_ah = [&](int slot) -> float {
            switch (slot) {
              case 1: return (float)id(bms1_factory_ah);
              case 2: return (float)id(bms2_factory_ah);
              case 3: return (float)id(bms3_factory_ah);
              case 4: return (float)id(bms4_factory_ah);
              case 5: return (float)id(bms5_factory_ah);
              case 6: return (float)id(bms6_factory_ah);
              default: return 0.0f;
            }
          };

          auto slot_remain_ah = [&](int slot) -> float {
            switch (slot) {
              case 1: return (float)id(bms1_remain_ah);
              case 2: return (float)id(bms2_remain_ah);
              case 3: return (float)id(bms3_remain_ah);
              case 4: return (float)id(bms4_remain_ah);
              case 5: return (float)id(bms5_remain_ah);
              case 6: return (float)id(bms6_remain_ah);
              default: return 0.0f;
            }
          };

          auto slot_rssi = [&](int slot) -> int16_t {
            switch (slot) {
              case 1: return id(bms1_rssi);
              case 2: return id(bms2_rssi);
              case 3: return id(bms3_rssi);
              case 4: return id(bms4_rssi);
              case 5: return id(bms5_rssi);
              case 6: return id(bms6_rssi);
              default: return -127;
            }
          };

          auto slot_cell_delta_mv = [&](int slot) -> uint16_t {
            uint16_t c1 = 0;
            uint16_t c2 = 0;
            uint16_t c3 = 0;
            uint16_t c4 = 0;
            switch (slot) {
              case 1: c1 = id(bms1_cell1_mv); c2 = id(bms1_cell2_mv); c3 = id(bms1_cell3_mv); c4 = id(bms1_cell4_mv); break;
              case 2: c1 = id(bms2_cell1_mv); c2 = id(bms2_cell2_mv); c3 = id(bms2_cell3_mv); c4 = id(bms2_cell4_mv); break;
              case 3: c1 = id(bms3_cell1_mv); c2 = id(bms3_cell2_mv); c3 = id(bms3_cell3_mv); c4 = id(bms3_cell4_mv); break;
              case 4: c1 = id(bms4_cell1_mv); c2 = id(bms4_cell2_mv); c3 = id(bms4_cell3_mv); c4 = id(bms4_cell4_mv); break;
              case 5: c1 = id(bms5_cell1_mv); c2 = id(bms5_cell2_mv); c3 = id(bms5_cell3_mv); c4 = id(bms5_cell4_mv); break;
              case 6: c1 = id(bms6_cell1_mv); c2 = id(bms6_cell2_mv); c3 = id(bms6_cell3_mv); c4 = id(bms6_cell4_mv); break;
              default: return 0;
            }

            uint16_t vmax = c1;
            uint16_t vmin = c1;
            if (c2 > vmax) vmax = c2;
            if (c3 > vmax) vmax = c3;
            if (c4 > vmax) vmax = c4;
            if (c2 < vmin) vmin = c2;
            if (c3 < vmin) vmin = c3;
            if (c4 < vmin) vmin = c4;
            return vmax - vmin;
          };

          auto slot_cell_temp_c = [&](int slot) -> int16_t {
            switch (slot) {
              case 1: return id(bms1_cell_temp);
              case 2: return id(bms2_cell_temp);
              case 3: return id(bms3_cell_temp);
              case 4: return id(bms4_cell_temp);
              case 5: return id(bms5_cell_temp);
              case 6: return id(bms6_cell_temp);
              default: return 0;
            }
          };

          auto slot_mosfet_temp_c = [&](int slot) -> int16_t {
            switch (slot) {
              case 1: return id(bms1_mosfet_temp);
              case 2: return id(bms2_mosfet_temp);
              case 3: return id(bms3_mosfet_temp);
              case 4: return id(bms4_mosfet_temp);
              case 5: return id(bms5_mosfet_temp);
              case 6: return id(bms6_mosfet_temp);
              default: return 0;
            }
          };

          auto slot_cycle_count = [&](int slot) -> uint32_t {
            switch (slot) {
              case 1: return id(bms1_cycle_count);
              case 2: return id(bms2_cycle_count);
              case 3: return id(bms3_cycle_count);
              case 4: return id(bms4_cycle_count);
              case 5: return id(bms5_cycle_count);
              case 6: return id(bms6_cycle_count);
              default: return 0;
            }
          };

          auto slot_discharge_ah_count = [&](int slot) -> uint32_t {
            switch (slot) {
              case 1: return id(bms1_discharge_ah_count);
              case 2: return id(bms2_discharge_ah_count);
              case 3: return id(bms3_discharge_ah_count);
              case 4: return id(bms4_discharge_ah_count);
              case 5: return id(bms5_discharge_ah_count);
              case 6: return id(bms6_discharge_ah_count);
              default: return 0;
            }
          };

          std::vector<GroupAgg> groups;
          GroupAgg current_group;
          bool used_slot[7] = {false, false, false, false, false, false, false};

          for (char c : topology) {
            if (c == '-' || c == ' ') {
              if (!current_group.slots.empty()) {
                groups.push_back(current_group);
                current_group = GroupAgg();
              }
              continue;
            }

            if (c >= '1' && c <= '6') {
              int slot = (int)(c - '0');
              if (!used_slot[slot]) {
                used_slot[slot] = true;
                current_group.slots.push_back(slot);
              }
            }
          }
          if (!current_group.slots.empty()) {
            groups.push_back(current_group);
          }

          int expected_slots = 0;
          for (int slot = 1; slot <= 6; slot++) {
            if (used_slot[slot]) {
              expected_slots++;
            }
          }

          bool topology_valid = !groups.empty();
          int active_slots = 0;
          int16_t pack_rssi_weakest_dbm = 0;
          bool pack_rssi_init = false;
          float slots_vmax_mv = 0.0f;
          float slots_vmin_mv = 0.0f;
          bool slots_v_init = false;
          float pack_cell_delta_max_mv = 0.0f;
          uint32_t pack_cycle_count_max = 0;
          uint64_t pack_discharged_ah_total = 0;
          int pack_cell_temp_min_c = 0;
          int pack_cell_temp_max_c = 0;
          int pack_mosfet_temp_min_c = 0;
          int pack_mosfet_temp_max_c = 0;
          bool pack_temp_init = false;

          for (auto &g : groups) {
            float group_voltage_sum = 0.0f;
            int group_voltage_count = 0;
            float group_current_sum = 0.0f;
            float group_capacity_sum = 0.0f;
            float group_remain_sum = 0.0f;

            for (int slot : g.slots) {
              if (!slot_enabled(slot)) {
                continue;
              }

              uint16_t vmv = slot_voltage_mv(slot);
              float cah = slot_capacity_ah(slot);
              if (vmv == 0 || cah <= 0.0f) {
                continue;
              }

              active_slots++;
              group_voltage_sum += (float)vmv;
              group_voltage_count++;
              group_current_sum += (float)slot_current_ma(slot);
              group_capacity_sum += cah;
              group_remain_sum += slot_remain_ah(slot);

              if (!pack_rssi_init) {
                pack_rssi_weakest_dbm = slot_rssi(slot);
                pack_rssi_init = true;
              } else if (slot_rssi(slot) < pack_rssi_weakest_dbm) {
                pack_rssi_weakest_dbm = slot_rssi(slot);
              }

              if (!slots_v_init) {
                slots_vmax_mv = (float)vmv;
                slots_vmin_mv = (float)vmv;
                slots_v_init = true;
              } else {
                if ((float)vmv > slots_vmax_mv) slots_vmax_mv = (float)vmv;
                if ((float)vmv < slots_vmin_mv) slots_vmin_mv = (float)vmv;
              }

              float slot_delta = (float)slot_cell_delta_mv(slot);
              if (slot_delta > pack_cell_delta_max_mv) {
                pack_cell_delta_max_mv = slot_delta;
              }

              uint32_t slot_cycles = slot_cycle_count(slot);
              if (slot_cycles > pack_cycle_count_max) {
                pack_cycle_count_max = slot_cycles;
              }
              pack_discharged_ah_total += (uint64_t) slot_discharge_ah_count(slot);

              int cell_t = (int)slot_cell_temp_c(slot);
              int mos_t = (int)slot_mosfet_temp_c(slot);
              if (!pack_temp_init) {
                pack_cell_temp_min_c = cell_t;
                pack_cell_temp_max_c = cell_t;
                pack_mosfet_temp_min_c = mos_t;
                pack_mosfet_temp_max_c = mos_t;
                pack_temp_init = true;
              } else {
                if (cell_t < pack_cell_temp_min_c) pack_cell_temp_min_c = cell_t;
                if (cell_t > pack_cell_temp_max_c) pack_cell_temp_max_c = cell_t;
                if (mos_t < pack_mosfet_temp_min_c) pack_mosfet_temp_min_c = mos_t;
                if (mos_t > pack_mosfet_temp_max_c) pack_mosfet_temp_max_c = mos_t;
              }
            }

            if (group_voltage_count == 0) {
              topology_valid = false;
              g.voltage_mv = 0.0f;
              g.current_ma = 0.0f;
              g.capacity_ah = 0.0f;
              g.remain_ah = 0.0f;
              g.contributing = 0;
            } else {
              g.voltage_mv = group_voltage_sum / (float)group_voltage_count;
              g.current_ma = group_current_sum;
              g.capacity_ah = group_capacity_sum;
              g.remain_ah = group_remain_sum;
              g.contributing = group_voltage_count;
            }
          }

          float pack_voltage_mv = 0.0f;
          float pack_current_ma = 0.0f;
          float pack_capacity_ah = 0.0f;
          float pack_remain_ah = 0.0f;
          float pack_soc = 0.0f;
          float pack_power_w = 0.0f;
          float series_group_voltage_delta_mv = 0.0f;
          float slot_voltage_delta_mv = 0.0f;
          int valid_groups = 0;

          if (topology_valid) {
            float current_sum = 0.0f;
            float min_capacity = 0.0f;
            float min_remain = 0.0f;
            bool min_init = false;
            float group_vmax_mv = 0.0f;
            float group_vmin_mv = 0.0f;
            bool group_v_init = false;

            for (auto &g : groups) {
              if (g.contributing == 0) {
                topology_valid = false;
                break;
              }
              valid_groups++;
              pack_voltage_mv += g.voltage_mv;
              current_sum += g.current_ma;

              if (!group_v_init) {
                group_vmax_mv = g.voltage_mv;
                group_vmin_mv = g.voltage_mv;
                group_v_init = true;
              } else {
                if (g.voltage_mv > group_vmax_mv) group_vmax_mv = g.voltage_mv;
                if (g.voltage_mv < group_vmin_mv) group_vmin_mv = g.voltage_mv;
              }

              if (!min_init) {
                min_capacity = g.capacity_ah;
                min_remain = g.remain_ah;
                min_init = true;
              } else if (g.capacity_ah < min_capacity) {
                min_capacity = g.capacity_ah;
              }

              if (g.remain_ah < min_remain) {
                min_remain = g.remain_ah;
              }
            }

            if (topology_valid && valid_groups > 0) {
              pack_current_ma = current_sum / (float)valid_groups;
              pack_capacity_ah = min_capacity;
              pack_remain_ah = min_remain;
              if (pack_capacity_ah > 0.0f) {
                pack_soc = (pack_remain_ah / pack_capacity_ah) * 100.0f;
                if (pack_soc < 0.0f) pack_soc = 0.0f;
                if (pack_soc > 100.0f) pack_soc = 100.0f;
              }
              pack_power_w = (pack_voltage_mv / 1000.0f) * (pack_current_ma / 1000.0f);
              series_group_voltage_delta_mv = group_vmax_mv - group_vmin_mv;
            }
          }

          if (slots_v_init) {
            slot_voltage_delta_mv = slots_vmax_mv - slots_vmin_mv;
          }

          bool topology_complete = topology_valid && expected_slots > 0 && active_slots == expected_slots;

          int pack_rssi_quality_pct = pack_rssi_weakest_dbm <= -100 ? 0 : (pack_rssi_weakest_dbm >= -50 ? 100 : (2 * (pack_rssi_weakest_dbm + 100)));
          const char *pack_rssi_quality = pack_rssi_weakest_dbm >= -60 ? "excellent" : (pack_rssi_weakest_dbm >= -70 ? "good" : (pack_rssi_weakest_dbm >= -80 ? "fair" : (pack_rssi_weakest_dbm >= -90 ? "weak" : "very_weak")));
          auto cell_balancer_level = [&](float delta_mv) -> const char * {
            if (delta_mv <= 10.0f) return "good";
            if (delta_mv <= 20.0f) return "light";
            if (delta_mv <= 40.0f) return "warning";
            return "critical";
          };
          // HA01 Equalizer works on 12V-pack differences and typically starts balancing around 20 mV.
          auto pack_series_balancer_level = [&](float delta_mv) -> const char * {
            if (delta_mv <= 20.0f) return "good";
            if (delta_mv <= 50.0f) return "light";
            if (delta_mv <= 120.0f) return "warning";
            return "critical";
          };
          const char *pack_cell_balancer_status = cell_balancer_level(pack_cell_delta_max_mv);
          const char *pack_series_balancer_status = pack_series_balancer_level(series_group_voltage_delta_mv);

          auto now = id(sntp_time).now();
          uint32_t ts = now.is_valid() ? (uint32_t) now.timestamp : 0;

          std::string group_parts;
          for (size_t gi = 0; gi < groups.size(); gi++) {
            if (gi > 0) {
              group_parts += ",";
            }

            std::string slots_json;
            for (size_t si = 0; si < groups[gi].slots.size(); si++) {
              if (si > 0) {
                slots_json += ",";
              }
              slots_json += esphome::to_string(groups[gi].slots[si]);
            }

            group_parts += esphome::str_sprintf(
              "{\"index\":%u,\"slots\":[%s],\"voltage_mv\":%.0f,\"current_ma\":%.0f,\"capacity_ah\":%.0f,\"contributors\":%d}",
              (unsigned int) (gi + 1),
              slots_json.c_str(),
              groups[gi].voltage_mv,
              groups[gi].current_ma,
              groups[gi].capacity_ah,
              groups[gi].contributing
            );
          }

          const std::string base_topic = std::string("${mqtt_topic_prefix}") + "/" + system_name + "/";
          auto publish_value = [&](const std::string &field, const std::string &value) {
            id(mqtt_client).publish(base_topic + field, value, 0, false);
          };

          publish_value("timestamp", esphome::to_string(ts));
          publish_value("system_name", system_name);
          publish_value("topology", topology);
          publish_value("topology_complete", topology_complete ? "true" : "false");
          publish_value("series_groups", esphome::to_string((unsigned int)groups.size()));
          publish_value("active_slots", esphome::to_string(active_slots));
          publish_value("expected_slots", esphome::to_string(expected_slots));
          publish_value("topology_reporting", esphome::to_string(active_slots) + "/" + esphome::to_string(expected_slots));
          publish_value("pack_voltage_mv", esphome::str_sprintf("%.0f", pack_voltage_mv));
          publish_value("pack_current_ma", esphome::str_sprintf("%.0f", pack_current_ma));
          publish_value("pack_capacity_ah", esphome::str_sprintf("%.0f", pack_capacity_ah));
          publish_value("pack_remain_ah", esphome::str_sprintf("%.0f", pack_remain_ah));
          publish_value("pack_soc", esphome::str_sprintf("%.1f", pack_soc));
          publish_value("pack_power_w", esphome::str_sprintf("%.3f", pack_power_w));
          publish_value("pack_rssi_weakest_dbm", esphome::to_string(pack_rssi_weakest_dbm));
          publish_value("pack_rssi_quality_pct", esphome::to_string(pack_rssi_quality_pct));
          publish_value("pack_rssi_quality", pack_rssi_quality);
          publish_value("pack_cell_temp_min_c", esphome::to_string(pack_cell_temp_min_c));
          publish_value("pack_cell_temp_max_c", esphome::to_string(pack_cell_temp_max_c));
          publish_value("pack_mosfet_temp_min_c", esphome::to_string(pack_mosfet_temp_min_c));
          publish_value("pack_mosfet_temp_max_c", esphome::to_string(pack_mosfet_temp_max_c));
          publish_value("series_group_voltage_delta_mv", esphome::str_sprintf("%.0f", series_group_voltage_delta_mv));
          publish_value("slot_voltage_delta_mv", esphome::str_sprintf("%.0f", slot_voltage_delta_mv));
          publish_value("pack_cell_delta_max_mv", esphome::str_sprintf("%.0f", pack_cell_delta_max_mv));
          publish_value("pack_cell_balancer_status", pack_cell_balancer_status);
          publish_value("pack_series_balancer_status", pack_series_balancer_status);
          publish_value("pack_cycle_count_max", esphome::to_string(pack_cycle_count_max));
          publish_value("pack_discharged_ah_total", esphome::to_string((uint32_t) pack_discharged_ah_total));
          publish_value("groups_json", "[" + group_parts + "]");

          for (size_t gi = 0; gi < groups.size(); gi++) {
            const std::string gbase = base_topic + "group_" + esphome::to_string((unsigned int)(gi + 1)) + "/";

            std::string slots_csv;
            for (size_t si = 0; si < groups[gi].slots.size(); si++) {
              if (si > 0) {
                slots_csv += ",";
              }
              slots_csv += esphome::to_string(groups[gi].slots[si]);
            }

            id(mqtt_client).publish(gbase + "slots", slots_csv, 0, false);
            id(mqtt_client).publish(gbase + "voltage_mv", esphome::str_sprintf("%.0f", groups[gi].voltage_mv), 0, false);
            id(mqtt_client).publish(gbase + "current_ma", esphome::str_sprintf("%.0f", groups[gi].current_ma), 0, false);
            id(mqtt_client).publish(gbase + "capacity_ah", esphome::str_sprintf("%.0f", groups[gi].capacity_ah), 0, false);
            id(mqtt_client).publish(gbase + "remain_ah", esphome::str_sprintf("%.0f", groups[gi].remain_ah), 0, false);
            id(mqtt_client).publish(gbase + "contributors", esphome::to_string(groups[gi].contributing), 0, false);
          }

  # ===== HOME ASSISTANT MQTT DISCOVERY =====
  - id: publish_ha_discovery
    then:
      - lambda: |-
          const std::string prefix = "${mqtt_topic_prefix}";
          const std::string discovery_prefix = "${ha_discovery_prefix}";
          const std::string system_name = "${battery_system_name}";
          const std::string node_id = "${gateway_name}";
          const std::string node_name = "${gateway_friendly_name}";

          auto now = id(sntp_time).now();
          uint32_t ts = now.is_valid() ? (uint32_t) now.timestamp : 0;
          if (ts > 0) {
            id(discovery_last_publish_epoch) = ts;
          } else if (id(discovery_last_publish_epoch) == 0) {
            // Sentinel: already published once but without valid time.
            id(discovery_last_publish_epoch) = 1;
          }
          ESP_LOGW("DISCOVERY", "Publishing HA discovery config topics (ts=%u)", ts);

          auto publish_sensor = [&](const std::string &object_id,
                                    const std::string &name,
                                    const std::string &state_topic,
                      const std::string &device_id,
                      const std::string &device_name,
                      const std::string &device_model,
                                    const std::string &unit,
                                    const std::string &device_class,
                                    const std::string &state_class,
                                    const std::string &icon) {
            std::string cfg_topic = discovery_prefix + "/sensor/" + node_id + "/" + object_id + "/config";
            std::string payload = "{";
            payload += "\"name\":\"" + name + "\",";
            payload += "\"unique_id\":\"" + node_id + "_" + object_id + "\",";
            payload += "\"state_topic\":\"" + state_topic + "\",";
            payload += "\"device\":{";
            payload += "\"identifiers\":[\"" + device_id + "\"],";
            payload += "\"name\":\"" + device_name + "\",";
            payload += "\"manufacturer\":\"ESPHome\",";
            payload += "\"model\":\"" + device_model + "\"";
            payload += "}";

            if (!unit.empty()) {
              payload += ",\"unit_of_measurement\":\"" + unit + "\"";
            }
            if (!device_class.empty()) {
              payload += ",\"device_class\":\"" + device_class + "\"";
            }
            if (!state_class.empty()) {
              payload += ",\"state_class\":\"" + state_class + "\"";
            }
            if (!icon.empty()) {
              payload += ",\"icon\":\"" + icon + "\"";
            }

            payload += "}";
            id(mqtt_client).publish(cfg_topic, payload, 0, true);
          };

          auto publish_binary_sensor = [&](const std::string &object_id,
                                           const std::string &name,
                                           const std::string &state_topic,
                                           const std::string &device_id,
                                           const std::string &device_name,
                                           const std::string &device_model,
                                           const std::string &payload_on,
                                           const std::string &payload_off,
                                           const std::string &device_class,
