            publish_sensor(slot_tag + "_pack_voltage_mv", "Pack Voltage", state_base + "pack_voltage_mv", dev_id, dev_name, dev_model, "mV", "voltage", "measurement", "mdi:car-battery");
            publish_sensor(slot_tag + "_remain_ah", "Remaining Capacity", state_base + "remain_ah", dev_id, dev_name, dev_model, "Ah", "", "measurement", "mdi:battery-medium");
