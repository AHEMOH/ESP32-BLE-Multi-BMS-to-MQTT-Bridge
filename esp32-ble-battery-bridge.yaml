            std::string payload = "{";
            payload += "\"name\":\"" + name + "\",";
            payload += "\"unique_id\":\"" + node_id + "_" + object_id + "\",";
            payload += "\"state_topic\":\"" + state_topic + "\",";
            payload += "\"payload_on\":\"" + payload_on + "\",";
            payload += "\"payload_off\":\"" + payload_off + "\",";
            payload += "\"device\":{";
            payload += "\"identifiers\":[\"" + device_id + "\"],";
            payload += "\"name\":\"" + device_name + "\",";
            payload += "\"manufacturer\":\"ESPHome\",";
            payload += "\"model\":\"" + device_model + "\"";
            payload += "}";

            if (!device_class.empty()) {
              payload += ",\"device_class\":\"" + device_class + "\"";
            }
            if (!icon.empty()) {
              payload += ",\"icon\":\"" + icon + "\"";
            }

            payload += "}";
            id(mqtt_client).publish(cfg_topic, payload, 0, true);
          };

          auto publish_epoch_timestamp_sensor = [&](const std::string &object_id,
                                                    const std::string &name,
                                                    const std::string &state_topic,
                                                    const std::string &device_id,
                                                    const std::string &device_name,
                                                    const std::string &device_model,
