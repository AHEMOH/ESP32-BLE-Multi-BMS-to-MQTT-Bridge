          publish_sensor("pack_discharged_ah_total", "Pack Discharged Capacity Total", pack_base + "pack_discharged_ah_total", pack_dev_id, pack_dev_name, pack_dev_model, "", "", "total_increasing", "mdi:battery-arrow-down-outline");
