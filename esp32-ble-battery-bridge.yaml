# ═══════════════════════════════════════════════════════════════════════
# SUBSTITUTIONS
# ═══════════════════════════════════════════════════════════════════════
substitutions:
  # ── Gateway & MQTT ────────────────────────────────────────────────────
  gateway_name: esp32-battery-bridge
  gateway_friendly_name: "ESP32 BLE Battery Bridge"
  mqtt_topic_prefix: ble_battery
  ha_discovery_prefix: homeassistant

  # ── Battery system for aggregation ────────────────────────────────────
  # '-' separates series groups; digits within a group are parallel.
  # Examples: "123-456" = 2S3P, "12-34-56" = 3S2P
  battery_system_name: "Bootsbatterie"
  battery_system_topology: "1-2"

  # ── Timing & retries (weak-signal profile for longer BLE range) ───────
  ble_connect_timeout: "1800ms"
  ble_read_timeout: "2200ms"
  ble_retry_backoff_delay: "1200ms"
  ble_disconnect_settle_delay: "1200ms"
  ble_sequential_delay: "1200ms"
  poll_interval: "30s"
  publish_raw_frame_hex: "false"
  debug_status_flags_hex: "false"
  watchdog_hang_timeout_s: "150"
  watchdog_idle_recover_s: "150"
  watchdog_reboot_after_recoveries: "3"

  # ── Battery slots (bms1–bms6) ─────────────────────────────────────────
  # name   = MQTT topic key (e.g. "P-12100BNNA70-XXXXXX"); empty = slot inactive
  # mac    = BLE address; empty = auto-bind by name (stored in NVS flash)
  # enabled = "true" / "false"  — slot is active when enabled=true AND name is not empty

  bms1_name: "P-12100BNNA70-XXXXXX"
  bms1_mac: "XX:XX:XX:XX:XX:XX"
  bms1_enabled: "true"

  bms2_name: "L-12100BNNA70-XXXXXX"
  bms2_mac: "XX:XX:XX:XX:XX:XX"
  bms2_enabled: "true"

  bms3_name: ""
  bms3_mac: ""
  bms3_enabled: "false"

  bms4_name: ""
  bms4_mac: ""
  bms4_enabled: "false"

  bms5_name: ""
  bms5_mac: ""
  bms5_enabled: "false"

  bms6_name: ""
  bms6_mac: ""
  bms6_enabled: "false"

esphome:
  name: ${gateway_name}
  friendly_name: ${gateway_friendly_name}
  on_boot:
    priority: -10
    then:
      - logger.log:
          format: "BLE Battery Bridge started (system=%s, topology=%s)"
          args: ['"${battery_system_name}"', '"${battery_system_topology}"']
          level: INFO

esp32:
  board: esp32dev
  framework:
    type: arduino

esp32_ble:
  max_connections: 6

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_2
      password: !secret wifi_password_2
    - ssid: !secret wifi_ssid_3
      password: !secret wifi_password_3

logger:
  level: WARN
  logs:
    mqtt: WARN
    wifi: WARN
    ble_client: WARN
    # BLE disconnects are intentional (sequential polling) — suppress to avoid log spam.
    ble_sensor: ERROR
    esp32_ble_client: WARN
    esp32_ble_tracker: WARN
    esp-idf: ERROR
    api: WARN
    sntp: WARN
    component: WARN
  on_message:
    then:
      - lambda: |-
          if (!id(mqtt_client).is_connected()) {
            return;
          }

          const std::string base = std::string("${mqtt_topic_prefix}") + "/" + std::string("${gateway_name}") + "/";
          uint32_t ts = 0;
          auto now = id(sntp_time).now();
          if (now.is_valid()) {
            ts = (uint32_t) now.timestamp;
          } else {
            ts = (uint32_t) (millis() / 1000UL);
          }

          std::string payload = esphome::to_string(ts);
          payload += "|";
          payload += tag;
          payload += "|";
          payload += message;

          // 1=ERROR, 2=WARN (ESPHOME logger levels)
          if (level == 1) {
            id(mqtt_client).publish(base + "last_error", payload, 0, true);
          } else if (level == 2) {
            id(mqtt_client).publish(base + "last_warning", payload, 0, true);
          }

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker_host
  port: 1883
  log_topic: null
  discovery: true
  discovery_prefix: ${ha_discovery_prefix}
  id: mqtt_client
  username: !secret mqtt_username
  password: !secret mqtt_password
  on_connect:
    then:
      - script.execute: publish_ha_discovery
      - script.execute: publish_gateway_status

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers:
      - pool.ntp.org
      - time.nist.gov

